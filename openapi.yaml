components:
  schemas:
    BearerResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        token_type:
          type: string
          title: Token Type
      type: object
      required:
        - access_token
        - token_type
      title: BearerResponse
    BidDB:
      properties:
        task_id:
          type: integer
          title: Task Id
        executor_id:
          type: integer
          title: Executor Id
      type: object
      required:
        - task_id
        - executor_id
      title: BidDB
    BidWithExecutor:
      properties:
        task_id:
          type: integer
          title: Task Id
        executor:
          $ref: "#/components/schemas/UserRead"
      type: object
      required:
        - task_id
        - executor
      title: BidWithExecutor
    Body_auth_jwt_login_auth_jwt_login_post:
      properties:
        grant_type:
          anyOf:
            - type: string
              pattern: ^password$
            - type: "null"
          title: Grant Type
        username:
          type: string
          title: Username
        password:
          type: string
          format: password
          title: Password
        scope:
          type: string
          title: Scope
          default: ""
        client_id:
          anyOf:
            - type: string
            - type: "null"
          title: Client Id
        client_secret:
          anyOf:
            - type: string
            - type: "null"
          format: password
          title: Client Secret
      type: object
      required:
        - username
        - password
      title: Body_auth_jwt_login_auth_jwt_login_post
    CreateTask:
      properties:
        title:
          type: string
          title: Title
        description:
          type: string
          title: Description
        price:
          type: number
          exclusiveMinimum: 0
          title: Price
      type: object
      required:
        - title
        - description
        - price
      title: CreateTask
    ErrorModel:
      properties:
        detail:
          anyOf:
            - type: string
            - additionalProperties:
                type: string
              type: object
          title: Detail
      type: object
      required:
        - detail
      title: ErrorModel
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: "#/components/schemas/ValidationError"
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    Page_BidWithExecutor_:
      properties:
        items:
          items:
            $ref: "#/components/schemas/BidWithExecutor"
          type: array
          title: Items
        total:
          type: integer
          minimum: 0
          title: Total
        page:
          type: integer
          minimum: 1
          title: Page
        size:
          type: integer
          minimum: 1
          title: Size
        pages:
          type: integer
          minimum: 0
          title: Pages
      type: object
      required:
        - items
        - total
        - page
        - size
        - pages
      title: Page[BidWithExecutor]
    Page_PaymnentDB_:
      properties:
        items:
          items:
            $ref: "#/components/schemas/PaymnentDB"
          type: array
          title: Items
        total:
          type: integer
          minimum: 0
          title: Total
        page:
          type: integer
          minimum: 1
          title: Page
        size:
          type: integer
          minimum: 1
          title: Size
        pages:
          type: integer
          minimum: 0
          title: Pages
      type: object
      required:
        - items
        - total
        - page
        - size
        - pages
      title: Page[PaymnentDB]
    Page_TaskDB_:
      properties:
        items:
          items:
            $ref: "#/components/schemas/TaskDB"
          type: array
          title: Items
        total:
          type: integer
          minimum: 0
          title: Total
        page:
          type: integer
          minimum: 1
          title: Page
        size:
          type: integer
          minimum: 1
          title: Size
        pages:
          type: integer
          minimum: 0
          title: Pages
      type: object
      required:
        - items
        - total
        - page
        - size
        - pages
      title: Page[TaskDB]
    PaymnentDB:
      properties:
        id:
          type: integer
          title: Id
        from_user:
          type: integer
          title: From User
        to_user:
          type: integer
          title: To User
        value:
          type: number
          title: Value
      type: object
      required:
        - id
        - from_user
        - to_user
        - value
      title: PaymnentDB
    PaymnetCreate:
      properties:
        user_id:
          type: integer
          title: User Id
        value:
          type: number
          exclusiveMinimum: 0
          title: Value
      type: object
      required:
        - user_id
        - value
      title: PaymnetCreate
    TaskDB:
      properties:
        title:
          type: string
          title: Title
        description:
          type: string
          title: Description
        price:
          type: number
          exclusiveMinimum: 0
          title: Price
        id:
          type: integer
          title: Id
        selected_executor_id:
          anyOf:
            - type: integer
            - type: "null"
          title: Selected Executor Id
        done_executor:
          type: boolean
          title: Done Executor
        done_customer:
          type: boolean
          title: Done Customer
      type: object
      required:
        - title
        - description
        - price
        - id
        - done_executor
        - done_customer
      title: TaskDB
    UserCreate:
      properties:
        username:
          type: string
          maxLength: 32
          title: Username
        first_name:
          type: string
          maxLength: 32
          title: First Name
        last_name:
          type: string
          maxLength: 32
          title: Last Name
        role_id:
          type: integer
          title: Role Id
        password:
          type: string
          title: Password
      type: object
      required:
        - username
        - first_name
        - last_name
        - role_id
        - password
      title: UserCreate
    UserRead:
      properties:
        username:
          type: string
          maxLength: 32
          title: Username
        first_name:
          type: string
          maxLength: 32
          title: First Name
        last_name:
          type: string
          maxLength: 32
          title: Last Name
        role_id:
          type: integer
          title: Role Id
        id:
          type: integer
          title: Id
        balance:
          type: number
          title: Balance
      type: object
      required:
        - username
        - first_name
        - last_name
        - role_id
        - id
        - balance
      title: UserRead
    UserUpdate:
      properties:
        username:
          type: string
          maxLength: 32
          title: Username
        first_name:
          type: string
          maxLength: 32
          title: First Name
        last_name:
          type: string
          maxLength: 32
          title: Last Name
        role_id:
          anyOf:
            - type: integer
            - type: "null"
          title: Role Id
      type: object
      title: UserUpdate
